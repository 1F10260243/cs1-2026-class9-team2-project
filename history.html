            <div class="text-group">
             <h2>キンボールの歴史と誕生</h2>
                <p>キンボールは<strong>1986年、カナダのケベック州</strong>で生まれました。</p>
                <p>考案したのは、体育教師の<strong>マリオ・ドゥマース氏</strong>です。</p>
                <p>当時、若者たちの無気力さや無関心さに危機感を持っていた彼は、<br>
                <strong>「スポーツを通じて感動を共有し、協調性を高めてほしい」</strong>という願いを込めて、試行錯誤の末にこの協議を作り出しました。</p>
                <p>その教育的なアプローチから、アメリカでは<strong>5,000校以上の学校</strong>で採用。<br>現在では日本やヨーロッパなど世界中で広がり、<strong>500万人以上</strong>が楽しむスポーツへと発展しています。</p>
            </div>
        </div>
